[pytest]
# Pytest configuration for Attendance Dashboard

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Markers for organizing tests
markers =
    unit: Unit tests
    integration: Integration tests
    security: Security-related tests
    auth: Authentication tests
    jwt: JWT validation tests
    session: Session management tests

# Coverage options
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --disable-warnings

# Output options
console_output_style = progress

# Asyncio mode
asyncio_mode = auto

# Timeout for tests (in seconds)
timeout = 300

# Show slowest tests
durations = 10

# Ignore warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
